# T0.A4 — CI pipeline. Enforces the operating contract on every PR.
# Spec: docs/stage1/Helm_T1_Launch_Spec_V2.md §T0.A4
#
# Three parallel jobs: python (helm-runtime), ui (helm-ui), commitlint.
# All three must pass for branch protection on main to allow merge.
#
# Spec deviations (documented in T0.A4 SITREP):
#   - Lint uses `black --check` to match the formatter installed by T0.A2's
#     pre-commit hooks (spec yaml said `ruff format --check`; equivalent
#     output, but matching local toolchain avoids drift).
#
# T0.A5 added the mypy --strict type-check step. Every helm-runtime source
# file is typed; mypy plugins/overrides are configured in pyproject.toml.

name: CI

on: [pull_request, push]

jobs:
  python:
    name: python (helm-runtime)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/helm-runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            services/helm-runtime/requirements.txt
            services/helm-runtime/requirements-dev.txt

      - name: Install
        # Hashed lockfiles (T0.A7). pip enforces hashes automatically when
        # they are present in the file.
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify lockfiles in sync with .in (T0.A7)
        # pip-compile is in requirements-dev so it's already installed above.
        # Regenerate over the committed files, then `git diff --exit-code` —
        # this avoids brittle header-comment comparisons (the auto-generated
        # header includes the output path, which differs between any two
        # invocations using a tmp path).
        # Lockfiles are platform-canonical: Linux Python 3.12 (matches CI +
        # the runtime Dockerfile base). Local devs on Windows/macOS should
        # use scripts/compile-deps.sh which runs pip-compile inside the same
        # base image.
        run: |
          python -m piptools compile --generate-hashes --strip-extras --quiet \
            -o requirements.txt requirements.in
          python -m piptools compile --generate-hashes --strip-extras --allow-unsafe --quiet \
            --constraint requirements.txt \
            -o requirements-dev.txt requirements-dev.in
          git diff --exit-code requirements.txt requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy --strict)
        run: mypy .

      - name: Test
        run: pytest --cov --cov-report=term

  ui:
    name: ui (helm-ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helm-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: helm-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      # On pull_request, lint the commits in the PR (base..head).
      # On push to main, lint just the pushed commit (HEAD~1..HEAD) — first
      # commit on a fresh repo would have no parent, so guard with `git rev-parse`.
      - name: Lint commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"
          else
            npx commitlint --from HEAD~1 --to HEAD
          fi
