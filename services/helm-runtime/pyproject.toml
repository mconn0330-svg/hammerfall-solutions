# Python tool config for the helm-runtime service.
# T0.A2 — pre-commit hooks (ruff, black) consume the [tool.ruff] / [tool.black] blocks.
# T0.A3 — pytest + coverage config in [tool.pytest.ini_options] / [tool.coverage.*].
# Spec: docs/stage1/Helm_T1_Launch_Spec_V2.md

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports are intentional
"agents/*.py" = ["E501"]  # agent system prompts are long-by-design paragraphs

[tool.black]
line-length = 100
target-version = ["py311"]

# T0.A5 — mypy strict mode. Every function signature is typed, including return
# types. External libraries without stubs are listed in [[tool.mypy.overrides]]
# below so unresolved-import errors don't bury real findings.
[tool.mypy]
python_version = "3.12"
strict = true
exclude = ["__pycache__"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["litellm", "litellm.*"]
ignore_missing_imports = true
