# T0.A2 — Python tool config for the helm-runtime service.
# Consumed by the pre-commit hooks defined in /.pre-commit-config.yaml.
# Spec: docs/stage1/Helm_T1_Launch_Spec_V2.md §T0.A2

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports are intentional

[tool.black]
line-length = 100
target-version = ["py311"]
