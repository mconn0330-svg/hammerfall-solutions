# Python tool config for the helm-runtime service.
# T0.A2 — pre-commit hooks (ruff, black) consume the [tool.ruff] / [tool.black] blocks.
# T0.A3 — pytest + coverage config in [tool.pytest.ini_options] / [tool.coverage.*].
# Spec: docs/stage1/Helm_T1_Launch_Spec_V2.md

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports are intentional

[tool.black]
line-length = 100
target-version = ["py311"]
